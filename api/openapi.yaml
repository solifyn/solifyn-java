openapi: 3.1.0
info:
  contact: {}
  description: "Welcome to the Solifyn API Reference. Leverage our secure endpoints\
    \ to manage products and issue, validate, and manage software license keys programmatically."
  title: Solifyn API
  version: 1.0.0
servers:
- description: Live environment
  url: http://localhost:8000
- description: Test environment
  url: http://localhost:8001
security:
- ApiKeyAuth: []
paths:
  /v1/user/theme/{subdomain}:
    get:
      description: Retrieve public theme configuration details by store subdomain.
      operationId: users:get_theme_by_subdomain
      parameters:
      - description: The subdomain of the store
        explode: false
        in: path
        name: subdomain
        required: true
        schema:
          example: acme
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTheme'
          description: Theme configurations retrieved successfully.
      security:
      - ApiKeyAuth: []
      summary: Get Theme by Subdomain
      tags:
      - User Profile & Themes
      x-accepts:
      - application/json
  /v1/user/my-theme:
    get:
      description: Retrieve theme configurations for the active business context.
      operationId: users:get_my_theme
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTheme'
          description: Active theme settings details.
      security:
      - ApiKeyAuth: []
      summary: Get My Theme
      tags:
      - User Profile & Themes
      x-accepts:
      - application/json
  /v1/user/my-page:
    get:
      description: Retrieve page settings and custom content configured for the store.
      operationId: users:get_my_page
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPage'
          description: Store page configuration data.
      security:
      - ApiKeyAuth: []
      summary: Get My Page details
      tags:
      - User Profile & Themes
      x-accepts:
      - application/json
  /v1/user/dashboard-stats:
    get:
      description: "Retrieve general analytics stats (revenue, order counts, etc.)\
        \ for dashboard graphs."
      operationId: users:get_stats
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStats'
          description: Dashboard analytics statistics data.
      security:
      - ApiKeyAuth: []
      summary: Get Dashboard Statistics
      tags:
      - User Profile & Themes
      x-accepts:
      - application/json
  /v1/user/settings:
    get:
      description: Retrieve profile settings and notification preferences for the
        user.
      operationId: users:get_settings
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
          description: User settings profile details retrieved.
      security:
      - ApiKeyAuth: []
      summary: Retrieve User Settings
      tags:
      - User Profile & Themes
      x-accepts:
      - application/json
    patch:
      description: "Update profile parameters, SEO, Google analytics, and email notification\
        \ properties."
      operationId: merchants:update_settings
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettingsUpdate'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
          description: User settings successfully updated.
      security:
      - ApiKeyAuth: []
      summary: Update Merchant Settings
      tags:
      - Businesses
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/products:
    get:
      description: "List and query products belonging to your active business with\
        \ support for fuzzy search, filters, pagination, and sorting."
      operationId: products:list
      parameters:
      - description: Filter by pricing type.
        explode: true
        in: query
        name: pricingType
        required: false
        schema:
          type: string
        style: form
      - description: Sorting criterion. Add a minus sign - before the criteria name
          to sort by descending order.
        explode: true
        in: query
        name: sorting
        required: false
        schema:
          enum:
          - created_at
          - -created_at
          - name
          - -name
          - price_amount
          - -price_amount
          type: string
        style: form
      - description: "Size of a page, defaults to 10. Maximum is 100."
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          type: number
        style: form
      - description: "Page number, defaults to 1."
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: number
        style: form
      - description: "Filter on recurring products (subscriptions). If true, only\
          \ subscription tiers are returned. If false, only one-time purchase products\
          \ are returned."
        explode: true
        in: query
        name: is_recurring
        required: false
        schema:
          type: boolean
        style: form
      - description: Filter by archived status.
        explode: true
        in: query
        name: is_archived
        required: false
        schema:
          type: boolean
        style: form
      - description: "Filter by product name (fuzzy, case-insensitive)."
        explode: true
        in: query
        name: query
        required: false
        schema:
          type: string
        style: form
      - description: Filter by product ID.
        explode: true
        in: query
        name: id
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/products_list_200_response'
          description: Successfully retrieved products list.
      security:
      - ApiKeyAuth: []
      summary: List Products
      tags:
      - Products
      x-codeSamples:
      - lang: typescript
        label: TypeScript SDK
        source: |-
          import { Solifyn } from 'solifyn';

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // List all products under the business
          const products = await solifyn.products.list();
          console.log('Products:', products);
      - lang: javascript
        label: JavaScript SDK
        source: |-
          const { Solifyn } = require('solifyn');

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // List all products under the business
          const products = await solifyn.products.list();
          console.log('Products:', products);
      - lang: python
        label: Python SDK
        source: |-
          from solifyn import Solifyn

          solifyn = Solifyn(api_key="your_private_api_key_here")

          # List all products under the business
          products = solifyn.products.list()
          print("Products:", products)
      - lang: php
        label: PHP SDK
        source: |-
          $solifyn = new \Solifyn\SolifynClient([
              'apiKey' => 'your_private_api_key_here'
          ]);

          // List all products under the business
          $products = $solifyn->products->list();
          print_r($products);
      - lang: go
        label: Go SDK
        source: |-
          import (
              "context"
              "fmt"
              "github.com/solifyn/solifyn-go"
          )

          client := solifyn.NewClient("your_private_api_key_here")

          // List all products under the business
          products, err := client.Products.List(context.Background())
          if err != nil {
              panic(err)
          }

          fmt.Println("Products:", products)
      - lang: java
        label: Java SDK
        source: |-
          import com.solifyn.SolifynClient;
          import com.solifyn.models.ProductList;

          SolifynClient client = new SolifynClient("your_private_api_key_here");

          // List all products under the business
          ProductList products = client.products().list();
          System.out.println("Products: " + products);
      - lang: ruby
        label: Ruby SDK
        source: |-
          require 'solifyn'

          solifyn = Solifyn::Client.new(api_key: 'your_private_api_key_here')

          # List all products under the business
          products = solifyn.products.list
          puts products
      x-accepts:
      - application/json
    post:
      description: Create a new product within your active business.
      operationId: products:create
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: Product created successfully.
      security:
      - ApiKeyAuth: []
      summary: Create Product
      tags:
      - Products
      x-codeSamples:
      - lang: typescript
        label: TypeScript SDK
        source: |-
          import { Solifyn } from 'solifyn';

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // Create a new product
          const product = await solifyn.products.create({
            name: 'Premium SaaS Plan',
            price: 49.99,
            currency: 'usd',
            taxCategory: 'saas',
            pricingType: 'renewal',
            billingPeriod: 30
          });
          console.log('Product Created:', product);
      - lang: javascript
        label: JavaScript SDK
        source: |-
          const { Solifyn } = require('solifyn');

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // Create a new product
          const product = await solifyn.products.create({
            name: 'Premium SaaS Plan',
            price: 49.99,
            currency: 'usd',
            taxCategory: 'saas',
            pricingType: 'renewal',
            billingPeriod: 30
          });
          console.log('Product Created:', product);
      - lang: python
        label: Python SDK
        source: |-
          from solifyn import Solifyn

          solifyn = Solifyn(api_key="your_private_api_key_here")

          # Create a new product
          product = solifyn.products.create(
              name="Premium SaaS Plan",
              price=49.99,
              currency="usd",
              tax_category="saas",
              pricing_type="renewal",
              billing_period=30
          )
          print("Product Created:", product)
      - lang: php
        label: PHP SDK
        source: |-
          $solifyn = new \Solifyn\SolifynClient([
              'apiKey' => 'your_private_api_key_here'
          ]);

          // Create a new product
          $product = $solifyn->products->create([
              'name' => 'Premium SaaS Plan',
              'price' => 49.99,
              'currency' => 'usd',
              'taxCategory' => 'saas',
              'pricingType' => 'renewal',
              'billingPeriod' => 30
          ]);
          print_r($product);
      - lang: go
        label: Go SDK
        source: |-
          import (
              "context"
              "fmt"
              "github.com/solifyn/solifyn-go"
          )

          client := solifyn.NewClient("your_private_api_key_here")

          // Create a new product
          product, err := client.Products.Create(context.Background(), &solifyn.ProductCreateParams{
              Name:          "Premium SaaS Plan",
              Price:         49.99,
              Currency:      "usd",
              TaxCategory:   "saas",
              PricingType:   "renewal",
              BillingPeriod: 30,
          })
          if err != nil {
              panic(err)
          }

          fmt.Println("Product Created:", product)
      - lang: java
        label: Java SDK
        source: |-
          import com.solifyn.SolifynClient;
          import com.solifyn.models.Product;
          import com.solifyn.models.ProductCreateParams;

          SolifynClient client = new SolifynClient("your_private_api_key_here");

          // Create a new product
          Product product = client.products().create(
              ProductCreateParams.builder()
                  .name("Premium SaaS Plan")
                  .price(49.99)
                  .currency("usd")
                  .taxCategory("saas")
                  .pricingType("renewal")
                  .billingPeriod(30)
                  .build()
          );
          System.out.println("Product Created: " + product);
      - lang: ruby
        label: Ruby SDK
        source: |-
          require 'solifyn'

          solifyn = Solifyn::Client.new(api_key: 'your_private_api_key_here')

          # Create a new product
          product = solifyn.products.create(
            name: 'Premium SaaS Plan',
            price: 49.99,
            currency: 'usd',
            tax_category: 'saas',
            pricing_type: 'renewal',
            billing_period: 30
          )
          puts product
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/products/{id}:
    delete:
      description: Archive a specific product to hide it from checkout pages and search
        results. Products are soft-deleted (archived) and can be restored using the
        unarchive endpoint.
      operationId: products:archive
      parameters:
      - description: The unique product ID to archive.
        explode: false
        in: path
        name: id
        required: true
        schema:
          example: prod_123
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/products_archive_200_response'
          description: Product archived successfully.
      security:
      - ApiKeyAuth: []
      summary: Archive Product
      tags:
      - Products
      x-codeSamples:
      - lang: typescript
        label: TypeScript SDK
        source: |-
          import { Solifyn } from 'solifyn';

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // Archive product
          await solifyn.products.archive('prod_019e56a1...');
          console.log('Product archived successfully');
      - lang: javascript
        label: JavaScript SDK
        source: |-
          const { Solifyn } = require('solifyn');

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // Archive product
          await solifyn.products.archive('prod_019e56a1...');
          console.log('Product archived successfully');
      - lang: python
        label: Python SDK
        source: |-
          from solifyn import Solifyn

          solifyn = Solifyn(api_key="your_private_api_key_here")

          # Archive product
          solifyn.products.archive("prod_019e56a1...")
          print("Product archived successfully")
      - lang: php
        label: PHP SDK
        source: |-
          $solifyn = new \Solifyn\SolifynClient([
              'apiKey' => 'your_private_api_key_here'
          ]);

          // Archive product
          $solifyn->products->archive('prod_019e56a1...');
          echo 'Product archived successfully';
      - lang: go
        label: Go SDK
        source: |-
          import (
              "context"
              "github.com/solifyn/solifyn-go"
          )

          client := solifyn.NewClient("your_private_api_key_here")

          // Archive product
          err := client.Products.Archive(context.Background(), "prod_019e56a1...")
          if err != nil {
              panic(err)
          }
      - lang: java
        label: Java SDK
        source: |-
          import com.solifyn.SolifynClient;

          SolifynClient client = new SolifynClient("your_private_api_key_here");

          // Archive product
          client.products().archive("prod_019e56a1...");
          System.out.println("Product archived successfully");
      - lang: ruby
        label: Ruby SDK
        source: |-
          require 'solifyn'

          solifyn = Solifyn::Client.new(api_key: 'your_private_api_key_here')

          # Archive product
          solifyn.products.archive('prod_019e56a1...')
          puts "Product archived successfully"
      x-accepts:
      - application/json
    get:
      description: Retrieve details of a specific product using its ID.
      operationId: products:get
      parameters:
      - description: The unique product ID.
        explode: false
        in: path
        name: id
        required: true
        schema:
          example: prod_123
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: Successfully retrieved product details.
      security:
      - ApiKeyAuth: []
      summary: Retrieve Product
      tags:
      - Products
      x-codeSamples:
      - lang: typescript
        label: TypeScript SDK
        source: |-
          import { Solifyn } from 'solifyn';

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // Retrieve product details
          const product = await solifyn.products.get('prod_019e56a1...');
          console.log('Product details:', product);
      - lang: javascript
        label: JavaScript SDK
        source: |-
          const { Solifyn } = require('solifyn');

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // Retrieve product details
          const product = await solifyn.products.get('prod_019e56a1...');
          console.log('Product details:', product);
      - lang: python
        label: Python SDK
        source: |-
          from solifyn import Solifyn

          solifyn = Solifyn(api_key="your_private_api_key_here")

          # Retrieve product details
          product = solifyn.products.get("prod_019e56a1...")
          print("Product details:", product)
      - lang: php
        label: PHP SDK
        source: |-
          $solifyn = new \Solifyn\SolifynClient([
              'apiKey' => 'your_private_api_key_here'
          ]);

          // Retrieve product details
          $product = $solifyn->products->get('prod_019e56a1...');
          print_r($product);
      - lang: go
        label: Go SDK
        source: |-
          import (
              "context"
              "fmt"
              "github.com/solifyn/solifyn-go"
          )

          client := solifyn.NewClient("your_private_api_key_here")

          // Retrieve product details
          product, err := client.Products.Get(context.Background(), "prod_019e56a1...")
          if err != nil {
              panic(err)
          }

          fmt.Println("Product:", product)
      - lang: java
        label: Java SDK
        source: |-
          import com.solifyn.SolifynClient;
          import com.solifyn.models.Product;

          SolifynClient client = new SolifynClient("your_private_api_key_here");

          // Retrieve product details
          Product product = client.products().get("prod_019e56a1...");
          System.out.println("Product details: " + product);
      - lang: ruby
        label: Ruby SDK
        source: |-
          require 'solifyn'

          solifyn = Solifyn::Client.new(api_key: 'your_private_api_key_here')

          # Retrieve product details
          product = solifyn.products.get('prod_019e56a1...')
          puts product
      x-accepts:
      - application/json
    patch:
      description: Update details of an existing product.
      operationId: products:update
      parameters:
      - description: The unique product ID.
        explode: false
        in: path
        name: id
        required: true
        schema:
          example: prod_123
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdate'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductMessageResponseDto'
          description: Product updated successfully.
      security:
      - ApiKeyAuth: []
      summary: Update Product
      tags:
      - Products
      x-codeSamples:
      - lang: typescript
        label: TypeScript SDK
        source: |-
          import { Solifyn } from 'solifyn';

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // Update product details
          const product = await solifyn.products.update('prod_019e56a1...', {
            name: 'Updated Product Name',
            price: 59.99
          });
          console.log('Product updated:', product);
      - lang: javascript
        label: JavaScript SDK
        source: |-
          const { Solifyn } = require('solifyn');

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // Update product details
          const product = await solifyn.products.update('prod_019e56a1...', {
            name: 'Updated Product Name',
            price: 59.99
          });
          console.log('Product updated:', product);
      - lang: python
        label: Python SDK
        source: |-
          from solifyn import Solifyn

          solifyn = Solifyn(api_key="your_private_api_key_here")

          # Update product details
          product = solifyn.products.update(
              product_id="prod_019e56a1...",
              name="Updated Product Name",
              price=59.99
          )
          print("Product updated:", product)
      - lang: php
        label: PHP SDK
        source: |-
          $solifyn = new \Solifyn\SolifynClient([
              'apiKey' => 'your_private_api_key_here'
          ]);

          // Update product details
          $product = $solifyn->products->update('prod_019e56a1...', [
              'name' => 'Updated Product Name',
              'price' => 59.99
          ]);
          print_r($product);
      - lang: go
        label: Go SDK
        source: |-
          import (
              "context"
              "fmt"
              "github.com/solifyn/solifyn-go"
          )

          client := solifyn.NewClient("your_private_api_key_here")

          // Update product details
          product, err := client.Products.Update(context.Background(), "prod_019e56a1...", &solifyn.ProductUpdateParams{
              Name:  "Updated Product Name",
              Price: 59.99,
          })
          if err != nil {
              panic(err)
          }

          fmt.Println("Product updated:", product)
      - lang: java
        label: Java SDK
        source: |-
          import com.solifyn.SolifynClient;
          import com.solifyn.models.Product;
          import com.solifyn.models.ProductUpdateParams;

          SolifynClient client = new SolifynClient("your_private_api_key_here");

          // Update product details
          Product product = client.products().update(
              "prod_019e56a1...",
              ProductUpdateParams.builder()
                  .name("Updated Product Name")
                  .price(59.99)
                  .build()
          );
          System.out.println("Product updated: " + product);
      - lang: ruby
        label: Ruby SDK
        source: |-
          require 'solifyn'

          solifyn = Solifyn::Client.new(api_key: 'your_private_api_key_here')

          # Update product details
          product = solifyn.products.update('prod_019e56a1...', {
            name: 'Updated Product Name',
            price: 59.99
          })
          puts product
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/products/{id}/unarchive:
    post:
      description: "Restore an archived product back to active status, making it visible\
        \ again."
      operationId: products:unarchive
      parameters:
      - description: The unique product ID to unarchive.
        explode: false
        in: path
        name: id
        required: true
        schema:
          example: prod_123
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/products_unarchive_200_response'
          description: Product unarchived successfully.
      security:
      - ApiKeyAuth: []
      summary: Unarchive Product
      tags:
      - Products
      x-codeSamples:
      - lang: typescript
        label: TypeScript SDK
        source: |-
          import { Solifyn } from 'solifyn';

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // Unarchive product
          await solifyn.products.unarchive('prod_019e56a1...');
          console.log('Product unarchived successfully');
      - lang: javascript
        label: JavaScript SDK
        source: |-
          const { Solifyn } = require('solifyn');

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // Unarchive product
          await solifyn.products.unarchive('prod_019e56a1...');
          console.log('Product unarchived successfully');
      - lang: python
        label: Python SDK
        source: |-
          from solifyn import Solifyn

          solifyn = Solifyn(api_key="your_private_api_key_here")

          # Unarchive product
          solifyn.products.unarchive("prod_019e56a1...")
          print("Product unarchived successfully")
      - lang: php
        label: PHP SDK
        source: |-
          $solifyn = new \Solifyn\SolifynClient([
              'apiKey' => 'your_private_api_key_here'
          ]);

          // Unarchive product
          $solifyn->products->unarchive('prod_019e56a1...');
          echo 'Product unarchived successfully';
      - lang: go
        label: Go SDK
        source: |-
          import (
              "context"
              "github.com/solifyn/solifyn-go"
          )

          client := solifyn.NewClient("your_private_api_key_here")

          // Unarchive product
          err := client.Products.Unarchive(context.Background(), "prod_019e56a1...")
          if err != nil {
              panic(err)
          }
      - lang: java
        label: Java SDK
        source: |-
