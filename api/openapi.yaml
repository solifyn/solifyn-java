          with solifyn.ApiClient(configuration) as api_client:
              api_instance = solifyn.ProductsApi(api_client)
              product_create = solifyn.ProductCreate(
                  name="Premium SaaS Plan",
                  price=49.99,
                  currency="usd",
                  tax_category="saas",
                  pricing_type="renewal",
                  billing_period=30,
              )

              try:
                  response = api_instance.products_create(product_create)
                  print("Response received:", response)
              except ApiException as e:
                  print("Exception when calling ProductsApi->products_create: %s\n" % e)
