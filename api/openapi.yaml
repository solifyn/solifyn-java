openapi: 3.1.0
info:
  contact: {}
  description: "Welcome to the Solifyn API Reference. Leverage our secure endpoints\
    \ to manage products and issue, validate, and manage software license keys programmatically."
  title: Solifyn API
  version: 1.0.0
servers:
- description: Live environment
  url: https://api.solifyn.com
- description: Test environment
  url: https://sandbox-api.solifyn.com
security:
- ApiKeyAuth: []
paths:
  /v1/products:
    get:
      description: "List and query products belonging to your active business with\
        \ support for fuzzy search, filters, pagination, and sorting."
      operationId: products:list
      parameters:
      - description: Filter by pricing type.
        explode: true
        in: query
        name: pricingType
        required: false
        schema:
          type: string
        style: form
      - description: Sorting criterion. Add a minus sign - before the criteria name
          to sort by descending order.
        explode: true
        in: query
        name: sorting
        required: false
        schema:
          enum:
          - created_at
          - -created_at
          - name
          - -name
          - price_amount
          - -price_amount
          type: string
        style: form
      - description: "Size of a page, defaults to 10. Maximum is 100."
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          type: number
        style: form
      - description: "Page number, defaults to 1."
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: number
        style: form
      - description: "Filter on recurring products (subscriptions). If true, only\
          \ subscription tiers are returned. If false, only one-time purchase products\
          \ are returned."
        explode: true
        in: query
        name: is_recurring
        required: false
        schema:
          type: boolean
        style: form
      - description: Filter by archived status.
        explode: true
        in: query
        name: is_archived
        required: false
        schema:
          type: boolean
        style: form
      - description: "Filter by product name (fuzzy, case-insensitive)."
        explode: true
        in: query
        name: query
        required: false
        schema:
          type: string
        style: form
      - description: Filter by product ID.
        explode: true
        in: query
        name: id
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/products_list_200_response'
          description: Successfully retrieved products list.
      security:
      - ApiKeyAuth: []
      summary: List Products
      tags:
      - Products
      x-codeSamples:
      - lang: typescript
        label: TypeScript SDK
        source: |-
          import { Solifyn } from 'solifyn';

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // List all products under the business
          const products = await solifyn.products.list();
          console.log('Products:', products);
      - lang: javascript
        label: JavaScript SDK
        source: |-
          const { Solifyn } = require('solifyn');

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // List all products under the business
          const products = await solifyn.products.list();
          console.log('Products:', products);
      - lang: python
        label: Python SDK
        source: |-
          import solifyn
          from solifyn.rest import ApiException

          configuration = solifyn.Configuration(
              host = "https://api.solifyn.com"
          )
          configuration.access_token = "your_private_api_key_here"

          with solifyn.ApiClient(configuration) as api_client:
              api_instance = solifyn.ProductsApi(api_client)

              try:
                  response = api_instance.products_list()
                  print("Response received:", response)
              except ApiException as e:
                  print("Exception when calling ProductsApi->products_list: %s\n" % e)
      - lang: php
        label: PHP SDK
        source: |-
          require_once(__DIR__ . '/vendor/autoload.php');

          use Solifyn\Configuration;
          use Solifyn\Api\ProductsApi;
          use GuzzleHttp\Client;

          $config = Configuration::getDefaultConfiguration()
              ->setAccessToken('your_private_api_key_here');
          $apiInstance = new ProductsApi(
              new Client(),
              $config
          );

          try {
              $result = $apiInstance->productsList();
              print_r($result);
          } catch (Exception $e) {
              echo 'Exception when calling ProductsApi->productsList: ', $e->getMessage(), PHP_EOL;
          }
      - lang: go
        label: Go SDK
        source: |-
          import (
              "context"
              "fmt"
              "os"
              solifyn "github.com/solifyn/solifyn-go"
          )

          configuration := solifyn.NewConfiguration()
          apiClient := solifyn.NewAPIClient(configuration)
          auth := context.WithValue(context.Background(), solifyn.ContextAccessToken, "your_private_api_key_here")

          resp, r, err := apiClient.ProductsAPI.ProductsList(auth).Execute()
          if err != nil {
              fmt.Fprintf(os.Stderr, "Error when calling `ProductsAPI.ProductsList`: %v\n", err)
              fmt.Fprintf(os.Stderr, "Full HTTP response: %v\n", r)
              return
          }
          fmt.Printf("Response: %v\n", resp)
      - lang: java
        label: Java SDK
        source: |-
          import com.solifyn.ApiClient;
          import com.solifyn.ApiException;
          import com.solifyn.Configuration;
          import com.solifyn.auth.HttpBearerAuth;
          import com.solifyn.api.ProductsApi;
          import com.solifyn.model.*;
          import java.math.BigDecimal;
          import java.util.Arrays;
          import java.util.HashMap;
          import java.util.List;
          import java.util.Map;

          ApiClient defaultClient = Configuration.getDefaultApiClient();
          defaultClient.setBasePath("https://api.solifyn.com");

          HttpBearerAuth ApiKeyAuth = (HttpBearerAuth) defaultClient.getAuthentication("ApiKeyAuth");
          ApiKeyAuth.setBearerToken("your_private_api_key_here");

          ProductsApi apiInstance = new ProductsApi(defaultClient);

          try {
              ProductsList200Response result = apiInstance.productsList();
              System.out.println(result);
          } catch (ApiException e) {
              System.err.println("Exception when calling ProductsApi#productsList");
              e.printStackTrace();
          }
      - lang: ruby
        label: Ruby SDK
        source: |-
          require 'solifyn'

          Solifyn.configure do |config|
            config.access_token = 'your_private_api_key_here'
            config.host = 'localhost:8000'
          end

          api_instance = Solifyn::ProductsApi.new

          begin
            result = api_instance.products_list()
            p result
          rescue Solifyn::ApiError => e
            puts "Exception when calling ProductsApi->products_list: #{e}"
          end
      - lang: csharp
        label: C# SDK
        source: |-
          using Solifyn.Api;
          using Solifyn.Client;
          using Solifyn.Model;
          using System;
          using System.Collections.Generic;

