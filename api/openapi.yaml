x-webhooks:
  payment.created:
    post:
      summary: Payment Created
      description: "Occurs when a new payment is initiated (e.g., at checkout start\
        \ or subscription creation). The payment may still be in an incomplete or\
        \ pending state."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookPaymentPayload'
            example:
              id: pay_123
              status: created
              substatus: incomplete
              customerId: usr_123
              customerEmail: customer@example.com
              customerName: John Doe
              customerUsername: johndoe
              productTitle: SaaS Pro Access
              productRoute: saas-pro-access
              planId: plan_123
              membershipId: mem_123
              membershipStatus: drafted
              billingReason: subscription_create
              amount: "29.00"
              subtotal: "29.00"
              usdTotal: "29.00"
              feeAmount: "1.50"
              amountAfterFees: "27.50"
              refundedAmount: "0"
              settlementAmount: "29.00"
              settlementCurrency: usd
              currency: USD
              refundable: false
              retryable: false
              autoRefunded: false
              billingAddress:
                name: John Doe
                line1: 123 Main St
                line2: ""
                city: San Francisco
                state: CA
                country: US
                postal_code: "94105"
              paidAt: 2026-05-25T20:20:05.000Z
              nextPaymentAttempt: 2026-05-25T20:20:05.000Z
              createdAt: 2026-05-25T20:20:06.000Z
              updatedAt: 2026-05-25T20:20:06.000Z
              paymentEventType: payment.created
              lastEventType: payment.created
              businessId: biz_123
      responses:
        "200":
          description: Webhook processed successfully.
  payment.succeeded:
    post:
      summary: Payment Succeeded
      description: Occurs when a customer payment is confirmed as succeeded.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        "200":
          description: Webhook processed successfully.
  payment.failed:
    post:
      summary: Payment Failed
      description: Occurs when a customer payment attempt fails.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        "200":
          description: Webhook processed successfully.
  refund.succeeded:
    post:
      summary: Refund Succeeded
      description: Occurs when a payment refund is confirmed as succeeded.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookRefundPayload'
      responses:
        "200":
          description: Webhook processed successfully.
  refund.failed:
    post:
      summary: Refund Failed
      description: Occurs when a payment refund fails.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookRefundPayload'
      responses:
        "200":
          description: Webhook processed successfully.
  dispute.created:
    post:
      summary: Dispute Created
      description: Occurs when a payment charge is disputed by the customer (chargeback
        initiated).
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookDisputePayload'
      responses:
        "200":
          description: Webhook processed successfully.
  dispute.won:
    post:
      summary: Dispute Won
      description: Occurs when a dispute challenge is won by the merchant.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookDisputePayload'
      responses:
        "200":
          description: Webhook processed successfully.
  dispute.lost:
    post:
      summary: Dispute Lost
      description: Occurs when a dispute challenge is lost and the funds are returned
        to the cardholder.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookDisputePayload'
      responses:
        "200":
          description: Webhook processed successfully.
  subscription.created:
    post:
      summary: Subscription Created
      description: Occurs when a customer subscription is successfully started.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookSubscriptionPayload'
      responses:
        "200":
          description: Webhook processed successfully.
  subscription.updated:
    post:
      summary: Subscription Updated
      description: "Occurs when a customer subscription is updated (e.g., cancel at\
        \ period end changes)."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookSubscriptionPayload'
      responses:
        "200":
          description: Webhook processed successfully.
  subscription.deactivated:
    post:
      summary: Subscription Deactivated
      description: Occurs when a customer subscription is deactivated or expired.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookSubscriptionPayload'
      responses:
        "200":
          description: Webhook processed successfully.
  license.created:
    post:
      summary: License Created
      description: Occurs when a new software license key is created or assigned to
        a customer purchase.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookLicensePayload'
      responses:
        "200":
          description: Webhook processed successfully.
  license.revoked:
    post:
      summary: License Revoked
      description: "Occurs when a software license key is revoked (e.g., due to subscription\
        \ cancellation, refund, or dispute)."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookLicensePayload'
      responses:
        "200":
          description: Webhook processed successfully.
  entitlement_grant.created:
    post:
      summary: Entitlement Grant Created
      description: "Occurs when a new entitlement grant is created (e.g., at checkout\
        \ completion if the product has GitHub access). The collaborator invitation\
        \ is pending."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookEntitlementGrantPayload'
      responses:
        "200":
          description: Webhook processed successfully.
  entitlement_grant.delivered:
    post:
      summary: Entitlement Grant Delivered
      description: Occurs when the customer successfully connects their GitHub account
        and the collaborator invitation is successfully delivered.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookEntitlementGrantPayload'
      responses:
        "200":
          description: Webhook processed successfully.
  entitlement_grant.failed:
    post:
      summary: Entitlement Grant Failed
      description: "Occurs when invitation delivery fails (e.g., if the user GitHub\
        \ account is flagged or invitation limit is reached)."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookEntitlementGrantPayload'
      responses:
        "200":
          description: Webhook processed successfully.
  entitlement_grant.revoked:
    post:
      summary: Entitlement Grant Revoked
      description: Occurs when the customer access is removed from the repository
        (manually or automatically via subscription cancel/refund).
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookEntitlementGrantPayload'
      responses:
        "200":
          description: Webhook processed successfully.

