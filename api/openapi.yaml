    WebhookLicensePayload:
      description: Represents a cryptographically secure software license key issued
        to a customer upon purchase or manual issuance.
      example:
        expiryHours: 720
        productId: prod_hyQQhhNzfEuvv
        businessId: biz_345TUESrCDPvrb
        instancesCount: 1
        filters: "{}"
        activationLimit: 3
        expiresAt: 2027-01-01T00:00:00.000Z
        archived: false
        createdAt: 2026-05-11T01:12:25.764Z
        paymentId: pay_3r2FgHXp9
        customerId: cust_3r2FgHXp9
        id: lic_hyQQhhNzfEuvv
        key: A184-99C2-8CBE
        activationMessage: Thank you! Your license is now active.
        status: ACTIVE
        updatedAt: 2026-05-18T09:45:37.166Z
      properties:
        id:
          description: The unique prefix-based identifier of the license key.
          example: lic_hyQQhhNzfEuvv
          type: string
        key:
          description: The cryptographically generated license key string delivered
            to the customer.
          example: A184-99C2-8CBE
          type: string
        status:
          description: Lifecycle status of the license. ACTIVE = active. DISABLED
            = suspended. REVOKED = hard-revoked.
          enum:
          - ACTIVE
          - DISABLED
          - REVOKED
          example: ACTIVE
          type: string
        businessId:
          description: The unique identifier associated with the business this license
            belongs to.
          example: biz_345TUESrCDPvrb
          type: string
        productId:
          description: The unique ID of the product this license key is associated
            with.
          example: prod_hyQQhhNzfEuvv
          type: string
          nullable: true
        paymentId:
          description: The unique payment identifier that triggered the issuance of
            this license key.
          example: pay_3r2FgHXp9
          type: string
          nullable: true
        customerId:
          description: The unique customer identifier (ID) who received this license
            key.
          example: cust_3r2FgHXp9
          type: string
          nullable: true
        activationLimit:
          description: Maximum number of simultaneous active device instances allowed
            for this license. Null means unlimited.
          example: 3
          type: number
          nullable: true
        activationMessage:
          description: Optional message displayed to the customer upon successful
            activation.
          example: Thank you! Your license is now active.
          type: string
          nullable: true
        instancesCount:
          description: Running count of how many times this license key has been activated.
          example: 1
          type: number
        expiryHours:
          description: Relative expiry duration in hours from the time of issuance.
          example: 720
          type: number
          nullable: true
        expiresAt:
          description: Absolute expiration timestamp. The license becomes invalid
            after this point.
          example: 2027-01-01T00:00:00.000Z
          type: string
          nullable: true
        filters:
          description: Optional custom metadata filters associated with the license.
          type: object
          nullable: true
          example: null
        archived:
          description: Indicates if the license key is archived.
          example: false
          type: boolean
        createdAt:
          description: Timestamp indicating exactly when the license key was issued.
          example: 2026-05-11T01:12:25.764Z
          type: string
        updatedAt:
          description: Timestamp indicating when the license key was last modified.
          example: 2026-05-18T09:45:37.166Z
          type: string
      required:
      - activationLimit
      - activationMessage
      - archived
      - businessId
      - createdAt
      - customerId
      - expiresAt
      - expiryHours
      - filters
      - id
      - instancesCount
      - key
      - paymentId
      - productId
      - status
      - updatedAt
