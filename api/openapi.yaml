          auth := context.WithValue(context.Background(), solifyn.ContextAccessToken, "your_private_api_key_here")
          productCreate := *solifyn.NewProductCreate()
          productCreate.SetName("Premium SaaS Plan")
          productCreate.SetPrice(49.99)
          productCreate.SetCurrency("usd")
          productCreate.SetTaxCategory("saas")
          productCreate.SetPricingType("renewal")
          productCreate.SetBillingPeriod(30)

          resp, r, err := apiClient.ProductsAPI.ProductsCreate(auth).ProductCreate(productCreate).Execute()
