        customFields:
          description: Custom text fields required for the purchase
          type: object
        aff:
          description: Affiliate partner tracking code
          example: partner_abc
          type: string
        checkoutId:
          description: The existing checkout database ID to validate / update
          example: 019e56ba-9832-72ae-XXXXXXXXXXX
          type: string
      required:
      - productId
    CheckoutResponseDto:
      example:
