              println(result)
          } catch (e: ClientException) {
              println("Client error: ${e.message}")
          } catch (e: ServerException) {
              println("Server error: ${e.message}")
          }
      x-accepts:
      - application/json
    post:
      description: Create a new product within your active business.
      operationId: products:create
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: Product created successfully.
      security:
      - ApiKeyAuth: []
      summary: Create Product
      tags:
      - Products
      x-codeSamples:
      - lang: typescript
        label: TypeScript SDK
        source: |-
          import { Solifyn } from 'solifyn';

          const solifyn = new Solifyn({ apiKey: 'your_private_api_key_here' });

          // Create a new product
          const product = await solifyn.products.create({
            name: 'Premium SaaS Plan',
            price: 49.99,
            currency: 'usd',
            taxCategory: 'saas',
            pricingType: 'renewal',
            billingPeriod: 30
          });
          console.log('Product Created:', product);
      - lang: javascript
        label: JavaScript SDK
