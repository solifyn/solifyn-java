        originalCurrency:
          description: Original ISO currency code of the product
          example: USD
          type: string
        convertedPrice:
          description: Converted price of the product
          example: 250000
          type: number
        convertedCurrency:
          description: Converted ISO currency code of the product
          example: VND
          type: string
      required:
      - convertedCurrency
      - convertedPrice
      - originalCurrency
      - originalPrice
    CreateCheckoutDto:
      example:
        customPrice: 15
        aff: partner_abc
        quantity: 1
        productId: prod_XXXXXXXXXXX
        discountCode: PROMO10
        customFields: "{}"
        customerEmail: customer@example.com
        checkoutData: "{}"
        currency: usd
        checkoutId: 019e56ba-9832-72ae-XXXXXXXXXXX
      properties:
        productId:
          description: The public product identifier (product ID)
          example: prod_XXXXXXXXXXX
          type: string
        currency:
