components:
  schemas:
    DashboardStatsDto:
      properties:
        revenue:
          description: Gross revenue in cents
          example: 500000
          type: number
        ordersCount:
          description: Total payments processed count
          example: 120
          type: number
        refundsCount:
          description: Gross amount refunded in cents
          example: 1500
          type: number
        activeMemberships:
          description: Number of active paying customers/memberships
          example: 85
          type: number
      required:
      - activeMemberships
      - ordersCount
      - refundsCount
      - revenue
    ProductMessageResponseDto:
      example:
        message: Product archived successfully
      properties:
        message:
          description: Response message indicating the outcome of the action.
          example: Product archived successfully
          type: string
      required:
      - message
    UpdateInstanceDto:
      properties:
        instanceName:
          description: The updated friendly name of the instance
          example: Developer Laptop
          type: string
        ipAddress:
          description: The updated IP address of the client device
          example: 192.168.1.1
          type: string
    ProductSubDto:
      example:
        name: name
        digitalLink: digitalLink
        id: id
      properties:
        id:
          type: string
        name:
          type: string
        digitalLink:
          type: string
          nullable: true
      required:
      - digitalLink
      - id
      - name
    LicenseSubDto:
      example:
        product:
          name: name
          digitalLink: digitalLink
          id: id
        id: id
        activationLimit: 0.8008281904610115
        key: key
        activationMessage: activationMessage
        expiresAt: expiresAt
        status: status
      properties:
        id:
          type: string
        key:
          type: string
        status:
          type: string
        activationLimit:
          type: number
          nullable: true
        activationMessage:
          type: string
          nullable: true
        expiresAt:
          type: string
          nullable: true
        product:
          $ref: '#/components/schemas/ProductSubDto'
      required:
      - activationLimit
      - activationMessage
      - expiresAt
      - id
      - key
      - status
    CheckoutSessionDetailsDto:
      example:
        product: "{}"
        price: 10
        customFields: "{}"
        paymentId: pay_XXXXXXXXX
        session_id: ch_XXXXXXXXX
        currency: USD
        storeName: Official Store
        id: ch_XXXXXXXXXXX
        billingAddress: "{}"
        status: pending
        checkoutUrl: https://solifyn.com/checkout/prod_XXXXXXXXX?checkout_id=019e56ba-9832-72ae-XXXXXXXXXXX
      properties:
        id:
          description: Checkout session identifier
          example: ch_XXXXXXXXXXX
          type: string
        price:
          description: Total purchase amount
          example: 10
          type: number
        currency:
          description: ISO currency code of the purchase
          example: USD
          type: string
        storeName:
          description: Title or name of the merchant/store selling the item
          example: Official Store
          type: string
        status:
          description: Current status of the checkout session
          example: pending
          type: string
        billingAddress:
          description: Customer billing address details
          type: object
        customFields:
          description: Custom fields collected during purchase
          type: object
        session_id:
          description: The payment partner session ID
          example: ch_XXXXXXXXX
          type: string
        paymentId:
          description: Database payment transaction ID
          example: pay_XXXXXXXXX
          type: string
        checkoutUrl:
          description: Checkout session redirect URL if loaded in link mode
          example: https://solifyn.com/checkout/prod_XXXXXXXXX?checkout_id=019e56ba-9832-72ae-XXXXXXXXXXX
          type: string
        product:
          allOf:
          - $ref: '#/components/schemas/Product'
