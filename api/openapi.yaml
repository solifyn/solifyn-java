  /v1/products/{id}:
    delete:
      description: Archive a specific product to hide it from checkout pages and search
        results. Products are soft-deleted (archived) and can be restored using the
        unarchive endpoint.
      operationId: products:archive
      parameters:
      - description: The unique product ID to archive.
        explode: false
        in: path
        name: id
        required: true
        schema:
          example: prod_123
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/products_archive_200_response'
          description: Product archived successfully.
      security:
      - ApiKeyAuth: []
      summary: Archive Product
      tags:
      - Products
