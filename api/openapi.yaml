    Discount:
      description: "Represents a discount code created under your business, containing\
        \ type, amount, usage limits, and expiration details."
      example:
        amount: 0
        code: code
        usageLimit: 6
        businessId: businessId
        type: percentage
        expiresAt: 2000-01-23T04:56:07.000+00:00
        createdAt: 2000-01-23T04:56:07.000+00:00
        name: name
        timesUsed: 1
        id: disc_cs8f67sd7f6fw3fs
        discount_id: disc_cs8f67sd7f6fw3fs
        status: active
        updatedAt: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          description: "The unique prefix-based identifier of the discount (e.g.,\
            \ `disc_cs8f67sd7f6fw3fs`)."
          example: disc_cs8f67sd7f6fw3fs
          type: string
        discount_id:
          description: Alias for the unique identifier of the discount.
          example: disc_cs8f67sd7f6fw3fs
          type: string
        code:
          description: The unique discount code (e.g. SAVE10) used during checkout.
          type: string
        name:
          description: The customer-facing name of the discount code (e.g. Summer
            Sale).
          type: string
        type:
          description: "The discount calculation type: percentage or fixed_amount."
          enum:
          - percentage
          - fixed_amount
          type: string
        amount:
          description: "The discount value. For percentage type, it is in basis points\
            \ (e.g. 1000 = 10.00%). For fixed_amount type, it is in cents (e.g. 1000\
            \ = $10.00)."
          type: integer
        usageLimit:
          description: Maximum number of times this discount code can be redeemed.
            Null represents unlimited usage.
          type: integer
          nullable: true
        timesUsed:
          description: The number of times this discount code has been successfully
            redeemed.
          type: integer
        expiresAt:
          description: The expiration timestamp after which the discount code is no
            longer valid.
          format: date-time
          type: string
          nullable: true
        status:
          description: The current status of the discount.
          enum:
          - active
          - expired
          type: string
        businessId:
          description: The unique identifier associated with the business this discount
            belongs to.
          type: string
        createdAt:
          description: Timestamp indicating exactly when the discount was created.
          format: date-time
          type: string
        updatedAt:
          description: Timestamp indicating when the discount was last updated.
          format: date-time
          type: string
      required:
      - amount
      - businessId
      - code
      - createdAt
      - created_at
      - discount_id
      - expiresAt
      - expires_at
      - id
      - status
      - timesUsed
      - times_used
      - type
      - updatedAt
      - updated_at
      - usageLimit
      - usage_limit
