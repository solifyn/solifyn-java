          description: Whether the product includes digital file downloads upon purchase.
          example: false
          type: boolean
        isTaxInclusive:
          description: Whether the product price already includes applicable sales
            taxes.
          example: false
          type: boolean
        billingPeriod:
          description: The subscription billing cycle interval in days (for subscription
            products).
          type: integer
          nullable: true
          example: null
        trialPeriodDays:
          description: Trial duration in days for subscription products.
          type: integer
          nullable: true
          example: null
        expirationDays:
          description: Automatic expiration period in days for the subscription entitlement.
          type: integer
          nullable: true
          example: null
